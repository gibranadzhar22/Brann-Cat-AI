<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brann AI 3D Voice - Kucing Gaul</title>
    <style>
        /* --- STYLING UTAMA (GLASSMORPHISM) --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
            --panel-bg: rgba(255, 255, 255, 0.45);
            --panel-border: rgba(255, 255, 255, 0.6);
            --text-color: #1e293b;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Mode Jahat: Tema Gelap Cyberpunk */
        .evil-mode {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --panel-bg: rgba(15, 23, 42, 0.55);
            --panel-border: rgba(239, 68, 68, 0.3);
            --text-color: #f8fafc;
            --shadow: 0 8px 32px 0 rgba(239, 68, 68, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
            padding: 15px;
        }

        /* Container Chat */
        .chat-container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Header Pilihan Mode */
        .chat-header {
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid var(--panel-border);
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-mode {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-good {
            background-color: #22c55e;
            color: white;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
        }

        .btn-evil {
            background-color: #ef4444;
            color: white;
            opacity: 0.5;
        }

        .evil-mode .btn-good { opacity: 0.5; box-shadow: none; }
        .evil-mode .btn-evil { opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 0.7); }

        /* Pembagian Area: Kiri (3D Model), Kanan (Chat) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* Area 3D Kucing */
        .view-3d-container {
            flex: 1.1;
            position: relative;
            border-right: 1px solid var(--panel-border);
            background: rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Embed Spline 3D Viewer */
        .spline-viewer-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-tag {
            position: absolute;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        /* Area Chat Percakapan */
        .chat-view {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.2);
        }

        .evil-mode .chat-view {
            background: rgba(0, 0, 0, 0.2);
        }

        .messages-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Bubble Chat */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.5;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brann-msg {
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .evil-mode .brann-msg {
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .user-msg {
            background: #0284c7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 3px 10px rgba(2, 132, 199, 0.25);
        }

        .evil-mode .user-msg {
            background: #ef4444;
            box-shadow: 0 3px 10px rgba(239, 68, 68, 0.25);
        }

        /* Bagian Input */
        .chat-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--panel-border);
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.85);
            color: #1e293b;
            font-size: 14.5px;
            outline: none;
        }

        .evil-mode .chat-input {
            background: rgba(15, 23, 42, 0.85);
            color: white;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .btn-send {
            padding: 0 22px;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover { background: #0369a1; }
        .evil-mode .btn-send { background: #ef4444; }
        .evil-mode .btn-send:hover { background: #dc2626; }

        /* Responsif Layar Kecil / HP */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .view-3d-container { flex: 0.8; border-right: none; border-bottom: 1px solid var(--panel-border); }
            .chat-view { flex: 1.2; }
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <button class="btn-mode btn-good" onclick="switchMode('baik')">Mode Baik</button>
            <button class="btn-mode btn-evil" onclick="switchMode('jahat')">Mode Jahat</button>
        </div>

        <div class="main-content">
            <div class="view-3d-container">
                <iframe id="splineFrame" class="spline-viewer-frame" src="https://my.spline.design/cutecatanimationcopy-5dd97a39ba47ff2f654b9d070119b9ff/"></iframe>
                <div class="status-tag" id="statusLabel">🟢 BRANN AI: MODE BAIK</div>
            </div>

            <div class="chat-view">
                <div class="messages-box" id="messagesBox">
                    <div class="message brann-msg">
                        Woi! Gua Brann versi baek, paling gaul, ready di sini. Mau nanya apa hari ini, sob? 😎✨
                    </div>
                </div>

                <div class="chat-footer">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ketik pesan untuk Brann..." onkeypress="checkEnter(event)">
                    <button class="btn-send" onclick="handleSend()">Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'baik';

        // Bank data suara/respons obrolan santai simulasi Brann AI
        const brannDialogues = {
            baik: [
                "Santuy sob, semua masalah lu bisa kita kelarin bareng-bareng! Btw, ada cerita seru apa hari ini? 😎",
                "Gokil! Pertanyaan lu keren abis. Jadi gini, kita gas terus jangan kasih kendor! 🔥",
                "Don't worry bro, Brann si kucing paling kece siap sedia nemenin lu. Chill aja! 🎧"
            ],
            jahat: [
                "Ck... nanya mulu, gak punya Google apa? Ketik sendiri sana, males gua melayani manusia. 😒",
                "Heh, lu tuh niat nanya atau cuma gabut doang sih? Mengganggu waktu tidur siang gua aja! 😾",
                "Tsk, dibilangin juga apa. Gak usah manja deh, cari tahu sendiri kan bisa. Berisik! 🐾"
            ]
        };

        // --- SEGMEN UTAMA: SYSTEM TEXT-TO-SPEECH (VOICE) ---
        function brannSpeak(textToSay) {
            // Hentikan paksa jika suara sebelumnya masih berbicara
            window.speechSynthesis.cancel();

            // Bersihkan teks dari emoji agar pembacaan tidak terdengar aneh
            const cleanText = textToSay.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF]/g, '');

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'id-ID'; // Pengaturan aksen Bahasa Indonesia resmi

            // Konfigurasi gelombang suara berdasarkan status kepribadian
            if (currentMode === 'jahat') {
                utterance.pitch = 0.55; // Suara berat, dalam, dan terkesan sinis/seram
                utterance.rate = 0.85;  // Intonasi lambat mengintimidasi
            } else {
                utterance.pitch = 1.35; // Suara tinggi, renyah, ekspresif, dan ceria
                utterance.rate = 1.15;  // Kecepatan ngomong anak muda gaul santai
            }

            window.speechSynthesis.speak(utterance);
        }

        // --- SISTEM PERGANTIAN MODE & ANIMASI 3D ---
        function switchMode(selectedMode) {
            if (currentMode === selectedMode) return;
            currentMode = selectedMode;

            const container = document.getElementById('chatContainer');
            const spline = document.getElementById('splineFrame');
            const label = document.getElementById('statusLabel');

            if (selectedMode === 'jahat') {
                container.classList.add('evil-mode');
                label.innerText = "🔴 BRANN AI: MODE JAHAT";
                
                // Ganti model animasi 3D kucing ke variasi pose galak/angry
                spline.src = "https://my.spline.design/scaredcatanimation-8f7ccf885e3532cf2b70f03b547285bf/";

                // Efek getaran ponsel pintar jika didukung perangkat
                if (navigator.vibrate) {
                    navigator.vibrate([80, 40, 80]);
                }

                const setupText = "Ck, mode jahat aktif. Mau apa lagi kamu? Jangan hancurin mood-ku.";
                postMessage("system", setupText);
                brannSpeak(setupText);

            } else {
                container.classList.remove('evil-mode');
                label.innerText = "🟢 BRANN AI: MODE BAIK";
                
                // Kembalikan ke model animasi 3D kucing kacamata santai/gaul
                spline.src = "https://my.spline.design/cutecatanimationcopy-5dd97a39ba47ff2f654b9d070119b9ff/";

                const setupText = "Halo! Mode baik balik lagi. Ada yang bisa dibantu, bro?";
                postMessage("system", setupText);
                brannSpeak(setupText);
            }
        }

        // --- ALUR KIRIM & RESPONS CHAT ---
        function handleSend() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            postMessage("user", text);
            input.value = "";

            // Simulasi jeda berpikir Brann sebelum merespons suara & teks
            setTimeout(() => {
                const pool = brannDialogues[currentMode];
                const reply = pool[Math.floor(Math.random() * pool.length)];
                
                postMessage("brann", reply);
                brannSpeak(reply); // Menjalankan fitur Voice output otomatis
            }, 700);
        }

        function checkEnter(e) {
            if (e.key === 'Enter') handleSend();
        }

        function postMessage(sender, msgText) {
            const box = document.getElementById('messagesBox');
            const item = document.createElement('div');

            if (sender === "user") {
                item.className = "message user-msg";
            } else {
                item.className = "message brann-msg";
                if (sender === "system") {
                    item.style.fontStyle = "italic";
                    item.style.opacity = "0.75";
                }
            }

            item.innerText = msgText;
            box.appendChild(item);
            box.scrollTop = box.scrollHeight; // Auto-scroll ke bawah otomatis
        }
    </script>
</body>
</html>
